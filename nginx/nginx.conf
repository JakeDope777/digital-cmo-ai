# ============================================================
# Nginx — Digital CMO AI Reverse Proxy
# ============================================================
# Responsibilities:
#   - Serve frontend (React SPA) on 80/443
#   - Proxy /api/* and /health* → backend:8000
#   - Proxy /ws/* → backend WebSocket
#   - SSL termination (place certs in /etc/nginx/certs/)
#   - Gzip compression
#   - Rate limiting
# ============================================================

worker_processes auto;
error_log  /var/log/nginx/error.log warn;
pid        /var/run/nginx.pid;

events {
    worker_connections 1024;
    use epoll;
    multi_accept on;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    # ── Logging ──────────────────────────────────────────
    log_format main '$remote_addr - $remote_user [$time_local] '
                    '"$request" $status $body_bytes_sent '
                    '"$http_referer" "$http_user_agent" '
                    'rt=$request_time';

    access_log /var/log/nginx/access.log main;

    # ── Performance ───────────────────────────────────────
    sendfile        on;
    tcp_nopush      on;
    tcp_nodelay     on;
    keepalive_timeout 65;
    server_tokens   off;

    # ── Gzip Compression ──────────────────────────────────
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types
        text/plain
        text/css
        text/xml
        text/javascript
        application/json
        application/javascript
        application/x-javascript
        application/xml
        application/xml+rss
        application/atom+xml
        image/svg+xml
        font/truetype
        font/opentype
        application/vnd.ms-fontobject;
    gzip_min_length 256;
    gzip_disable "msie6";

    # ── Rate Limiting Zones ───────────────────────────────
    # General API rate limit: 60 req/min per IP
    limit_req_zone $binary_remote_addr zone=api_limit:10m rate=60r/m;
    # Auth endpoints: 10 req/min per IP (brute-force protection)
    limit_req_zone $binary_remote_addr zone=auth_limit:10m rate=10r/m;
    # Webhook/stripe: 30 req/min per IP
    limit_req_zone $binary_remote_addr zone=webhook_limit:10m rate=30r/m;

    # ── Real IP from proxy/load balancer ──────────────────
    set_real_ip_from  10.0.0.0/8;
    set_real_ip_from  172.16.0.0/12;
    set_real_ip_from  192.168.0.0/16;
    real_ip_header    X-Forwarded-For;
    real_ip_recursive on;

    # ── Upstream Definitions ──────────────────────────────
    upstream backend_api {
        server backend:8000;
        keepalive 32;
    }

    upstream frontend_app {
        server frontend:3000;
        keepalive 16;
    }

    # ── HTTP → HTTPS redirect ─────────────────────────────
    server {
        listen 80;
        server_name _;

        # Allow Let's Encrypt ACME challenge through
        location /.well-known/acme-challenge/ {
            root /var/www/certbot;
        }

        location / {
            return 301 https://$host$request_uri;
        }
    }

    # ── Main HTTPS Server ─────────────────────────────────
    server {
        listen 443 ssl http2;
        server_name digital-cmo.ai www.digital-cmo.ai app.digital-cmo.ai api.digital-cmo.ai;

        # ── SSL ───────────────────────────────────────────
        ssl_certificate     /etc/nginx/certs/fullchain.pem;
        ssl_certificate_key /etc/nginx/certs/privkey.pem;
        ssl_protocols       TLSv1.2 TLSv1.3;
        ssl_ciphers         ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305:DHE-RSA-AES128-GCM-SHA256;
        ssl_prefer_server_ciphers off;
        ssl_session_cache   shared:SSL:10m;
        ssl_session_timeout 1d;
        ssl_session_tickets off;

        # HSTS (63072000 seconds = 2 years)
        add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;

        # ── Security Headers ──────────────────────────────
        add_header X-Frame-Options DENY always;
        add_header X-Content-Type-Options nosniff always;
        add_header X-XSS-Protection "1; mode=block" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;
        add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;

        # ── Client Config ─────────────────────────────────
        client_max_body_size 32m;
        client_body_timeout  60s;
        client_header_timeout 15s;

        # ── WebSocket: /ws/* → backend ────────────────────
        location /ws/ {
            proxy_pass          http://backend_api;
            proxy_http_version  1.1;
            proxy_set_header    Upgrade $http_upgrade;
            proxy_set_header    Connection "upgrade";
            proxy_set_header    Host $host;
            proxy_set_header    X-Real-IP $remote_addr;
            proxy_set_header    X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header    X-Forwarded-Proto $scheme;
            proxy_read_timeout  86400s;   # Keep WS connections alive
            proxy_send_timeout  86400s;
        }

        # ── Auth endpoints (strict rate limit) ────────────
        location ~ ^/api/(auth|login|register|password) {
            limit_req zone=auth_limit burst=5 nodelay;
            limit_req_status 429;

            proxy_pass          http://backend_api;
            proxy_http_version  1.1;
            proxy_set_header    Connection "";
            proxy_set_header    Host $host;
            proxy_set_header    X-Real-IP $remote_addr;
            proxy_set_header    X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header    X-Forwarded-Proto $scheme;
            proxy_connect_timeout 10s;
            proxy_read_timeout    30s;
        }

        # ── Stripe webhook (medium rate limit) ────────────
        location /api/billing/webhook {
            limit_req zone=webhook_limit burst=10 nodelay;
            limit_req_status 429;

            proxy_pass          http://backend_api;
            proxy_http_version  1.1;
            proxy_set_header    Connection "";
            proxy_set_header    Host $host;
            proxy_set_header    X-Real-IP $remote_addr;
            proxy_set_header    X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header    X-Forwarded-Proto $scheme;
            proxy_set_header    Stripe-Signature $http_stripe_signature;
            proxy_read_timeout  30s;
        }

        # ── API: /api/* → backend:8000 ────────────────────
        location /api/ {
            limit_req zone=api_limit burst=20 nodelay;
            limit_req_status 429;

            proxy_pass          http://backend_api;
            proxy_http_version  1.1;
            proxy_set_header    Connection "";
            proxy_set_header    Host $host;
            proxy_set_header    X-Real-IP $remote_addr;
            proxy_set_header    X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header    X-Forwarded-Proto $scheme;
            proxy_connect_timeout 10s;
            proxy_read_timeout    120s;
            proxy_send_timeout    60s;

            # Cache control for API responses
            add_header Cache-Control "no-store, no-cache, must-revalidate" always;
        }

        # ── Health endpoints → backend (no rate limit) ────
        location ~ ^/health {
            proxy_pass          http://backend_api;
            proxy_http_version  1.1;
            proxy_set_header    Connection "";
            proxy_set_header    Host $host;
            proxy_set_header    X-Real-IP $remote_addr;
            proxy_set_header    X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header    X-Forwarded-Proto $scheme;
            access_log off;
        }

        # ── Frontend SPA: everything else → frontend:3000 ─
        location / {
            proxy_pass          http://frontend_app;
            proxy_http_version  1.1;
            proxy_set_header    Connection "";
            proxy_set_header    Host $host;
            proxy_set_header    X-Real-IP $remote_addr;
            proxy_set_header    X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header    X-Forwarded-Proto $scheme;
            proxy_connect_timeout 10s;
            proxy_read_timeout    30s;

            # SPA fallback: serve index.html for unknown routes
            proxy_intercept_errors on;
            error_page 404 = @spa_fallback;
        }

        location @spa_fallback {
            proxy_pass http://frontend_app;
            proxy_set_header X-Forwarded-Uri $request_uri;
        }

        # ── Static asset caching ──────────────────────────
        location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot|webp|avif)$ {
            proxy_pass http://frontend_app;
            expires 1y;
            add_header Cache-Control "public, immutable";
            access_log off;
        }

        # ── Block common attack paths ─────────────────────
        location ~ /\. {
            deny all;
            access_log off;
            log_not_found off;
        }
    }
}
