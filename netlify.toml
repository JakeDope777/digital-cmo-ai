[build]
      base = "frontend"
      command = "npm install --legacy-peer-deps && npm run build"
      publish = "dist"

    [build.environment]
      NODE_VERSION = "20"
      VITE_VARIANT = "B"

    [[redirects]]
      from = "/login"
      to = "/index.html"
      status = 200

    [[redirects]]
      from = "/register"
      to = "/index.html"
      status = 200

    [[redirects]]
      from = "/dashboard"
      to = "/index.html"
      status = 200

    [[redirects]]
      from = "/dashboard/*"
      to = "/index.html"
      status = 200

    [[redirects]]
      from = "/chat"
      to = "/index.html"
      status = 200

    [[redirects]]
      from = "/analysis"
      to = "/index.html"
      status = 200

    [[redirects]]
      from = "/growth"
      to = "/index.html"
      status = 200

    [[redirects]]
      from = "/creative"
      to = "/index.html"
      status = 200

    [[redirects]]
      from = "/crm"
      to = "/index.html"
      status = 200

    [[redirects]]
      from = "/integrations"
      to = "/index.html"
      status = 200

    [[redirects]]
      from = "/billing"
      to = "/index.html"
      status = 200

    [[redirects]]
      from = "/settings"
      to = "/index.html"
      status = 200

    [[redirects]]
      from = "/*"
      to = "/index.html"
      status = 200

